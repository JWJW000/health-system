server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/healthy_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

auth:
  jwt:
    # 实际部署时请修改为更安全的随机密钥
    secret: "healthy-system-default-secret-please-change"
    expire-minutes: 120

